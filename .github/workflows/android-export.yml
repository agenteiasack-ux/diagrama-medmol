name: Build Android APK

on:
  push:
    branches:
      - claude/genomics-idle-game-planning-7nc1h
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 33
        run: |
          sdkmanager --install \
            "platform-tools" \
            "build-tools;33.0.2" \
            "platforms;android-33"

      - name: Download Godot headless
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          sudo install -m755 \
            "Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot
          godot --version

      - name: Install export templates
        run: |
          TDIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TDIR"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip "Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mv templates/* "$TDIR/"
          echo "=== Android templates installed ==="
          ls "$TDIR/" | grep -i android

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore "$GITHUB_WORKSPACE/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "Keystore: $(ls -lh $GITHUB_WORKSPACE/debug.keystore)"

      - name: Configure Godot editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "%s"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' \
            "$ANDROID_SDK_ROOT" \
            "$GITHUB_WORKSPACE/debug.keystore" \
            > "$HOME/.config/godot/editor_settings-4.tres"
          echo "=== Editor settings ==="
          cat "$HOME/.config/godot/editor_settings-4.tres"

      - name: Configure keystore in export presets
        working-directory: genomia
        run: |
          KS="$GITHUB_WORKSPACE/debug.keystore"
          sed -i "s|keystore/debug=\"\"|keystore/debug=\"$KS\"|" export_presets.cfg
          sed -i 's|keystore/debug_user=""|keystore/debug_user="androiddebugkey"|' export_presets.cfg
          sed -i 's|keystore/debug_password=""|keystore/debug_password="android"|' export_presets.cfg
          echo "=== export_presets.cfg keystore section ==="
          grep -n "keystore" export_presets.cfg
          echo "=== Keystore file exists ==="
          ls -lh "$KS"

      - name: Import project assets
        working-directory: genomia
        run: |
          godot --headless --import 2>&1 || true
          echo "Import done"

      - name: Create output directory
        run: mkdir -p genomia/builds

      - name: Export APK
        working-directory: genomia
        run: godot --headless --export-debug "Android" builds/genomia.apk 2>&1

      - name: Verify APK
        run: ls -lh genomia/builds/genomia.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GENOMIA-Android-Debug
          path: genomia/builds/genomia.apk
          if-no-files-found: error
          retention-days: 30
