name: Build Android APK

on:
  push:
    branches:
      - claude/genomics-idle-game-planning-7nc1h
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 33
        run: |
          sdkmanager --install \
            "platform-tools" \
            "build-tools;33.0.2" \
            "platforms;android-33"

      - name: Download Godot headless
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          sudo install -m755 \
            "Godot_v${GODOT_VERSION}-stable_linux.x86_64" \
            /usr/local/bin/godot

      - name: Install export templates
        run: |
          TDIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TDIR"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mv templates/* "$TDIR/"

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore "$GITHUB_WORKSPACE/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Create Godot editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" << EOSETTINGS
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/debug_keystore = "$GITHUB_WORKSPACE/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOSETTINGS

      - name: Configure keystore in export presets
        working-directory: genomia
        run: |
          sed -i \
            's|keystore/debug=""|keystore/debug="'"$GITHUB_WORKSPACE"'/debug.keystore"|' \
            export_presets.cfg
          sed -i \
            's|keystore/debug_user=""|keystore/debug_user="androiddebugkey"|' \
            export_presets.cfg
          sed -i \
            's|keystore/debug_password=""|keystore/debug_password="android"|' \
            export_presets.cfg

      - name: Create output directory
        run: mkdir -p genomia/builds

      - name: Export APK
        working-directory: genomia
        run: godot --headless --export-debug "Android" builds/genomia.apk

      - name: Verify APK exists
        run: ls -lh genomia/builds/genomia.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GENOMIA-Android-Debug
          path: genomia/builds/genomia.apk
          if-no-files-found: error
          retention-days: 30
